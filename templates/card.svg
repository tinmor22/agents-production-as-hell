<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <rect width="1080" height="1080" fill="#1a1a2e"/>
  <text x="540" y="100" text-anchor="middle" fill="#ffffff" font-size="48" font-family="Inter">{{.Title}}</text>
  <text x="540" y="160" text-anchor="middle" fill="#cccccc" font-size="28" font-family="Inter">{{.Subtitle}}</text>
  <text x="270" y="300" text-anchor="middle" fill="{{.EntityA.AccentColor}}" font-size="36" font-family="Inter">{{.EntityA.Name}}</text>
  <text x="810" y="300" text-anchor="middle" fill="{{.EntityB.AccentColor}}" font-size="36" font-family="Inter">{{.EntityB.Name}}</text>
  <line x1="0" y1="350" x2="1080" y2="350" stroke="#333333" stroke-width="2"/>
  <text x="540" y="1050" text-anchor="middle" fill="#666666" font-size="18" font-family="Inter">{{.Watermark}}</text>
</svg>
